<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" font-family="'Microsoft YaHei','SimHei','PingFang SC',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#333"/></marker>
  </defs>

  <!-- Layer labels (left side) -->
  <rect x="10" y="55" width="100" height="190" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="60" y="145" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">应用层</text>

  <rect x="10" y="260" width="100" height="190" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="60" y="355" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">通信层</text>

  <rect x="10" y="460" width="100" height="55" rx="8" fill="#d1fae5" stroke="#16a34a" stroke-width="1.5"/>
  <text x="60" y="493" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534">中间件层</text>

  <!-- Hardware layer (bottom spanning) -->
  <rect x="10" y="520" width="780" height="40" rx="8" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="400" y="545" text-anchor="middle" font-size="14" font-weight="bold" fill="#3730a3">硬件层 (ESP32-P4 / ESP32-C5 / PCA9685 / MPU6050 / 舵机)</text>

  <!-- Application Layer boxes -->
  <rect x="130" y="70" width="180" height="55" rx="6" fill="#fff" stroke="#f59e0b" stroke-width="2" filter="drop-shadow(1px 1px 2px rgba(0,0,0,0.1))"/>
  <text x="220" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Web 控制界面</text>
  <text x="220" y="110" text-anchor="middle" font-size="10" fill="#666">三栏Tab设计</text>

  <rect x="330" y="70" width="180" height="55" rx="6" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
  <text x="420" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">控制模式</text>
  <text x="420" y="110" text-anchor="middle" font-size="10" fill="#666">手动/体感/坐标规划</text>

  <rect x="530" y="70" width="200" height="55" rx="6" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
  <text x="630" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">运动脚本</text>
  <text x="630" y="110" text-anchor="middle" font-size="10" fill="#666">归位/挥手/搬运</text>

  <!-- Communication Layer boxes -->
  <rect x="130" y="275" width="180" height="55" rx="6" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
  <text x="220" y="297" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">HTTP 服务器</text>
  <text x="220" y="315" text-anchor="middle" font-size="10" fill="#666">Port 80, 命令分发</text>

  <rect x="330" y="275" width="180" height="55" rx="6" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
  <text x="420" y="297" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">WebSocket</text>
  <text x="420" y="315" text-anchor="middle" font-size="10" fill="#666">双向实时通信</text>

  <rect x="530" y="275" width="200" height="55" rx="6" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
  <text x="630" y="297" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">DNS 重定向</text>
  <text x="630" y="315" text-anchor="middle" font-size="10" fill="#666">Captive Portal</text>

  <!-- Middleware Layer boxes -->
  <rect x="130" y="475" width="180" height="40" rx="6" fill="#fff" stroke="#22c55e" stroke-width="2"/>
  <text x="220" y="500" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">运动学求解器</text>

  <rect x="330" y="475" width="180" height="40" rx="6" fill="#fff" stroke="#22c55e" stroke-width="2"/>
  <text x="420" y="500" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">PID 控制器</text>

  <!-- Data flow arrows -->
  <line x1="220" y1="125" x2="220" y2="270" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="230" y="200" font-size="9" fill="#f59e0b">Web命令</text>

  <line x1="420" y1="125" x2="420" y2="270" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="430" y="200" font-size="9" fill="#f59e0b">控制指令</text>

  <line x1="630" y1="125" x2="630" y2="270" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <line x1="220" y1="330" x2="220" y2="470" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="230" y="400" font-size="9" fill="#3b82f6">HTTP/WS</text>

  <line x1="420" y1="330" x2="420" y2="470" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <line x1="220" y1="515" x2="220" y2="525" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="420" y1="515" x2="420" y2="525" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- External devices -->
  <rect x="130" y="400" width="180" height="40" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="220" y="425" text-anchor="middle" font-size="11" fill="#dc2626">手机 IMU (目标输入)</text>

  <rect x="530" y="400" width="200" height="40" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="630" y="425" text-anchor="middle" font-size="11" fill="#dc2626">MPU6050 (末端反馈)</text>

  <line x1="220" y1="400" x2="220" y2="330" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="228" y="370" font-size="9" fill="#ef4444">pitch/roll</text>

  <line x1="630" y1="400" x2="630" y2="330" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="638" y="370" font-size="9" fill="#ef4444">实测角度</text>

</svg>
