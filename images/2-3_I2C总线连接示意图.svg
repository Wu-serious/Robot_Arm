<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="'Microsoft YaHei','SimHei','PingFang SC',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#333"/></marker>
  </defs>

  <!-- I2C Bus (horizontal line) -->
  <line x1="100" y1="120" x2="700" y2="120" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
  <text x="400" y="110" text-anchor="middle" font-size="13" fill="#f59e0b" font-weight="bold">I2C 总线 (SCL = GPIO52)</text>

  <line x1="100" y1="150" x2="700" y2="150" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
  <text x="400" y="140" text-anchor="middle" font-size="13" fill="#ef4444" font-weight="bold">I2C 总线 (SDA = GPIO51)</text>

  <!-- Pull-up resistors -->
  <rect x="155" y="105" width="20" height="15" rx="2" fill="none" stroke="#666" stroke-width="1.5"/>
  <text x="165" y="102" text-anchor="middle" font-size="8" fill="#666">R</text>
  <line x1="165" y1="105" x2="165" y2="120" stroke="#666" stroke-width="1"/>

  <rect x="625" y="135" width="20" height="15" rx="2" fill="none" stroke="#666" stroke-width="1.5"/>
  <text x="635" y="132" text-anchor="middle" font-size="8" fill="#666">R</text>
  <line x1="635" y1="150" x2="635" y2="135" stroke="#666" stroke-width="1"/>

  <!-- ESP32-P4 Master -->
  <rect x="250" y="170" width="140" height="80" rx="8" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2.5"/>
  <text x="320" y="195" text-anchor="middle" font-size="13" font-weight="bold" fill="#3730a3">ESP32-P4</text>
  <text x="320" y="215" text-anchor="middle" font-size="11" fill="#6366f1">I2C Master</text>
  <text x="320" y="235" text-anchor="middle" font-size="10" fill="#6366f1">SDA:GPIO51 SCL:GPIO52</text>
  <line x1="320" y1="170" x2="320" y2="150" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- PCA9685 Slave 1 -->
  <rect x="100" y="170" width="130" height="80" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="165" y="195" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">PCA9685</text>
  <text x="165" y="215" text-anchor="middle" font-size="10" fill="#b45309">PWM驱动</text>
  <text x="165" y="235" text-anchor="middle" font-size="10" fill="#b45309">Addr: 0x40  16ch 12bit</text>
  <line x1="165" y1="170" x2="165" y2="150" stroke="#d97706" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- MPU6050 Slave 2 -->
  <rect x="570" y="170" width="130" height="80" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="635" y="195" text-anchor="middle" font-size="12" font-weight="bold" fill="#065f46">MPU6050</text>
  <text x="635" y="215" text-anchor="middle" font-size="10" fill="#047857">IMU传感器</text>
  <text x="635" y="235" text-anchor="middle" font-size="10" fill="#047857">Addr: 0x68  ±250°/s ±2g</text>
  <line x1="635" y1="170" x2="635" y2="150" stroke="#059669" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Servos output from PCA9685 -->
  <line x1="165" y1="250" x2="165" y2="270" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="165" y="285" text-anchor="middle" font-size="10" fill="#d97706">↓ 5路PWM输出</text>

  <rect x="80" y="295" width="170" height="50" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="165" y="315" text-anchor="middle" font-size="11" font-weight="bold" fill="#c2410c">5× MG996R 舵机</text>
  <text x="165" y="333" text-anchor="middle" font-size="9" fill="#92400e">J0底座 J1肩 J2肘 J3腕 夹爪</text>

  <!-- Mutex lock icon -->
  <rect x="420" y="270" width="160" height="75" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="500" y="295" text-anchor="middle" font-size="12" font-weight="bold" fill="#9d174d">⚡ I2C 信号量锁</text>
  <text x="500" y="315" text-anchor="middle" font-size="10" fill="#be185d">互斥访问，防止并发冲突</text>
  <text x="500" y="333" text-anchor="middle" font-size="10" fill="#be185d">超时 20ms，队列缓冲</text>
  <line x1="420" y1="307" x2="380" y2="307" stroke="#db2777" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="580" y1="307" x2="620" y2="307" stroke="#db2777" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Config info -->
  <rect x="250" y="300" width="150" height="45" rx="6" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="325" y="320" text-anchor="middle" font-size="10" fill="#0369a1">频率: 100kHz</text>
  <text x="325" y="338" text-anchor="middle" font-size="10" fill="#0369a1">内部上拉电阻</text>
</svg>
