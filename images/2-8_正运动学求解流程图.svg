<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 640" font-family="'Microsoft YaHei','SimHei','PingFang SC',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#333"/></marker>
  </defs>

  <!-- Start -->
  <rect x="330" y="45" width="140" height="36" rx="18" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="400" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#3730a3">开始</text>

  <line x1="400" y1="81" x2="400" y2="105" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Input -->
  <rect x="280" y="105" width="240" height="45" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="125" text-anchor="middle" font-size="11" fill="#1e40af">输入: θ₀, θ₁, θ₂, θ₃ (四关节角度)</text>
  <text x="400" y="142" text-anchor="middle" font-size="10" fill="#666">单位: 度 (0-180°)</text>

  <line x1="400" y1="150" x2="400" y2="175" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 1: Convert to radians -->
  <rect x="280" y="175" width="240" height="40" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="400" y="193" text-anchor="middle" font-size="11" fill="#92400e">θᵢ(rad) = (θᵢ(deg) - 90) × π/180</text>
  <text x="400" y="210" text-anchor="middle" font-size="10" fill="#666">关节角度转换到数学空间</text>

  <line x1="400" y1="215" x2="400" y2="240" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: Compute intermediate angles -->
  <rect x="280" y="240" width="240" height="40" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="400" y="258" text-anchor="middle" font-size="11" fill="#92400e">φ₁ = (90 - θ₁) × π/180</text>
  <text x="400" y="275" text-anchor="middle" font-size="10" fill="#666">肩关节角度反向映射</text>

  <line x1="400" y1="280" x2="400" y2="305" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: Calculate horizontal distance -->
  <rect x="220" y="305" width="360" height="50" rx="4" fill="#d1fae5" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="325" text-anchor="middle" font-size="11" fill="#065f46">水平距离 h = l₁·sin(φ₁) + l₂·sin(φ₁+φ₂) + Lₑ·sin(φ₁+φ₂+φ₃)</text>
  <text x="400" y="345" text-anchor="middle" font-size="10" fill="#666">l₁=78mm, l₂=45mm, l₃=68mm, Lₑ=l₃+gripper=126mm</text>

  <line x1="400" y1="355" x2="400" y2="380" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: Compute XYZ -->
  <rect x="220" y="380" width="360" height="80" rx="4" fill="#d1fae5" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="402" text-anchor="middle" font-size="11" fill="#065f46">X = h · cos(θ₀)</text>
  <text x="400" y="422" text-anchor="middle" font-size="11" fill="#065f46">Y = h · sin(θ₀)</text>
  <text x="400" y="442" text-anchor="middle" font-size="10" fill="#666">Z = base_height + l₁·cos(φ₁) + l₂·cos(φ₁+φ₂) + Lₑ·cos(φ₁+φ₂+φ₃)</text>

  <line x1="400" y1="460" x2="400" y2="480" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="300" y="480" width="200" height="45" rx="4" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="400" y="500" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6">输出: (X, Y, Z) 末端坐标</text>
  <text x="400" y="518" text-anchor="middle" font-size="10" fill="#666">单位: mm, 原点: 底座中心</text>

  <line x1="400" y1="525" x2="400" y2="545" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- End -->
  <rect x="330" y="545" width="140" height="36" rx="18" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="400" y="568" text-anchor="middle" font-size="12" font-weight="bold" fill="#3730a3">结束</text>
</svg>
