<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 470" font-family="'Microsoft YaHei','SimHei','PingFang SC',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#333"/></marker>
  </defs>

  <!-- MPU6050 chip -->
  <rect x="200" y="60" width="400" height="400" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="3"/>
  <text x="400" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#166534">MPU6050</text>
  <text x="400" y="108" text-anchor="middle" font-size="11" fill="#15803d">六轴惯性测量单元 (陀螺仪 + 加速度计)</text>

  <!-- I2C Interface (left) -->
  <rect x="220" y="120" width="150" height="80" rx="6" fill="#fff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="295" y="140" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">I2C 接口</text>
  <text x="240" y="162" font-size="10" fill="#333">SDA → GPIO51</text>
  <text x="240" y="180" font-size="10" fill="#333">SCL → GPIO52</text>
  <text x="240" y="198" font-size="10" fill="#333">ADDR: 0x68</text>

  <line x1="370" y1="160" x2="470" y2="160" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Sensor axes (right) -->
  <rect x="480" y="120" width="100" height="200" rx="6" fill="#fff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="530" y="140" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">传感通道</text>

  <text x="490" y="165" font-size="10" fill="#333">X轴陀螺仪</text>
  <text x="490" y="183" font-size="10" fill="#333">Y轴陀螺仪</text>
  <text x="490" y="201" font-size="10" fill="#333">Z轴陀螺仪</text>
  <text x="490" y="226" font-size="10" fill="#333">X轴加速度</text>
  <text x="490" y="244" font-size="10" fill="#333">Y轴加速度</text>
  <text x="490" y="262" font-size="10" fill="#333">Z轴加速度</text>
  <text x="490" y="280" font-size="10" fill="#333">温度传感器</text>

  <!-- Configuration (bottom left) -->
  <rect x="220" y="220" width="240" height="130" rx="6" fill="#fff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="340" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">配置参数</text>

  <text x="240" y="262" font-size="10" fill="#333">陀螺仪量程: ±250°/s</text>
  <text x="240" y="280" font-size="10" fill="#333">加速度计量程: ±2g</text>
  <text x="240" y="300" font-size="10" fill="#333">自校准: 100次采样求零偏</text>
  <text x="240" y="320" font-size="10" fill="#333">互补滤波: α=0.99</text>
  <text x="240" y="340" font-size="10" fill="#333">采样率: 100Hz</text>

  <!-- Key registers (bottom) -->
  <rect x="220" y="350" width="360" height="105" rx="6" fill="#fff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="400" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">关键寄存器</text>
  <text x="400" y="390" text-anchor="middle" font-size="9" fill="#666">PWR_MGMT_1(0x6B) | GYRO_CONFIG(0x1B)</text>
  <text x="400" y="405" text-anchor="middle" font-size="9" fill="#666">ACCEL_CONFIG(0x1C) | INT_ENABLE(0x38)</text>
  <text x="400" y="427" text-anchor="middle" font-size="9" fill="#666">输出: ACCEL(0x3B~0x44) | GYRO(0x43~0x48) | TEMP(0x41)</text>
</svg>
