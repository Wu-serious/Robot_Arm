<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Microsoft YaHei','SimHei','PingFang SC',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#333"/></marker>
  </defs>

  <!-- Time axis -->
  <line x1="80" y1="70" x2="760" y2="70" stroke="#333" stroke-width="2"/>
  <text x="770" y="75" font-size="12" fill="#333" font-weight="bold">→ 时间</text>
  <text x="40" y="75" font-size="12" fill="#333" font-weight="bold">T</text>

  <!-- Tick marks every 20ms -->
  <text x="80" y="65" text-anchor="middle" font-size="9" fill="#666">0</text>
  <text x="160" y="65" text-anchor="middle" font-size="9" fill="#666">20</text>
  <text x="240" y="65" text-anchor="middle" font-size="9" fill="#666">40</text>
  <text x="320" y="65" text-anchor="middle" font-size="9" fill="#666">60</text>
  <text x="400" y="65" text-anchor="middle" font-size="9" fill="#666">80</text>
  <text x="480" y="65" text-anchor="middle" font-size="9" fill="#666">100</text>
  <text x="560" y="65" text-anchor="middle" font-size="9" fill="#666">120</text>
  <text x="640" y="65" text-anchor="middle" font-size="9" fill="#666">140</text>
  <text x="720" y="65" text-anchor="middle" font-size="9" fill="#666">160</text>
  <text x="760" y="65" text-anchor="middle" font-size="9" fill="#666">180</text>

  <!-- Vertical grid lines -->
  <line x1="160" y1="70" x2="160" y2="420" stroke="#eee" stroke-width="1"/>
  <line x1="240" y1="70" x2="240" y2="420" stroke="#eee" stroke-width="1"/>
  <line x1="320" y1="70" x2="320" y2="420" stroke="#eee" stroke-width="1"/>
  <line x1="400" y1="70" x2="400" y2="420" stroke="#eee" stroke-width="1"/>
  <line x1="480" y1="70" x2="480" y2="420" stroke="#eee" stroke-width="1"/>
  <line x1="560" y1="70" x2="560" y2="420" stroke="#eee" stroke-width="1"/>
  <line x1="640" y1="70" x2="640" y2="420" stroke="#eee" stroke-width="1"/>
  <line x1="720" y1="70" x2="720" y2="420" stroke="#eee" stroke-width="1"/>

  <!-- Task 1: IMU_Feedback_Task (10ms) -->
  <rect x="30" y="90" width="70" height="30" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="65" y="108" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">IMU反馈</text>
  <text x="65" y="118" text-anchor="middle" font-size="9" fill="#d97706">100Hz</text>

  <rect x="100" y="90" width="30" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="120" y="90" width="30" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="140" y="90" width="30" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="160" y="90" width="30" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="180" y="90" width="30" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="200" y="90" width="30" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="220" y="90" width="30" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="240" y="90" width="30" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="260" y="90" width="30" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="280" y="90" width="30" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="300" y="90" width="30" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="320" y="90" width="30" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="340" y="90" width="30" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="360" y="90" width="30" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="380" y="90" width="30" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="400" y="90" width="30" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="420" y="90" width="30" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="440" y="90" width="30" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="460" y="90" width="30" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="480" y="90" width="30" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="500" y="90" width="30" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="520" y="90" width="30" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="540" y="90" width="30" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="560" y="90" width="30" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="580" y="90" width="30" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="600" y="90" width="30" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="620" y="90" width="30" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="640" y="90" width="30" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="660" y="90" width="30" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="680" y="90" width="30" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="700" y="90" width="30" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="720" y="90" width="30" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="740" y="90" width="20" height="30" rx="3" fill="#fbbf24" opacity="0.8"/>

  <!-- Task 2: Control_Task (20ms) -->
  <rect x="30" y="170" width="70" height="30" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="65" y="188" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">Control</text>
  <text x="65" y="198" text-anchor="middle" font-size="9" fill="#3b82f6">50Hz</text>

  <rect x="140" y="170" width="40" height="30" rx="3" fill="#60a5fa" opacity="0.8"/>
  <rect x="220" y="170" width="40" height="30" rx="3" fill="#60a5fa" opacity="0.8"/>
  <rect x="300" y="170" width="40" height="30" rx="3" fill="#60a5fa" opacity="0.8"/>
  <rect x="380" y="170" width="40" height="30" rx="3" fill="#60a5fa" opacity="0.8"/>
  <rect x="460" y="170" width="40" height="30" rx="3" fill="#60a5fa" opacity="0.8"/>
  <rect x="540" y="170" width="40" height="30" rx="3" fill="#60a5fa" opacity="0.8"/>
  <rect x="620" y="170" width="40" height="30" rx="3" fill="#60a5fa" opacity="0.8"/>
  <rect x="700" y="170" width="40" height="30" rx="3" fill="#60a5fa" opacity="0.8"/>

  <!-- Task 3: Servo_Task (20ms) -->
  <rect x="30" y="250" width="70" height="30" rx="4" fill="#d1fae5" stroke="#16a34a" stroke-width="2"/>
  <text x="65" y="268" text-anchor="middle" font-size="10" font-weight="bold" fill="#065f46">Servo</text>
  <text x="65" y="278" text-anchor="middle" font-size="9" fill="#16a34a">50Hz</text>

  <rect x="160" y="250" width="40" height="30" rx="3" fill="#34d399" opacity="0.8"/>
  <rect x="240" y="250" width="40" height="30" rx="3" fill="#34d399" opacity="0.8"/>
  <rect x="320" y="250" width="40" height="30" rx="3" fill="#34d399" opacity="0.8"/>
  <rect x="400" y="250" width="40" height="30" rx="3" fill="#34d399" opacity="0.8"/>
  <rect x="480" y="250" width="40" height="30" rx="3" fill="#34d399" opacity="0.8"/>
  <rect x="560" y="250" width="40" height="30" rx="3" fill="#34d399" opacity="0.8"/>
  <rect x="640" y="250" width="40" height="30" rx="3" fill="#34d399" opacity="0.8"/>
  <rect x="720" y="250" width="40" height="30" rx="3" fill="#34d399" opacity="0.8"/>

  <!-- Task 4: WebStatus_Task (50ms) -->
  <rect x="30" y="330" width="70" height="30" rx="4" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="65" y="348" text-anchor="middle" font-size="10" font-weight="bold" fill="#5b21b6">WebStatus</text>
  <text x="65" y="358" text-anchor="middle" font-size="9" fill="#7c3aed">20Hz</text>

  <rect x="300" y="330" width="60" height="30" rx="3" fill="#a78bfa" opacity="0.8"/>
  <rect x="500" y="330" width="60" height="30" rx="3" fill="#a78bfa" opacity="0.8"/>
  <rect x="700" y="330" width="60" height="30" rx="3" fill="#a78bfa" opacity="0.8"/>

  <!-- Legend -->
  <rect x="30" y="380" width="740" height="115" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="50" y="402" font-size="12" font-weight="bold" fill="#333">IPC 机制</text>

  <rect x="50" y="412" width="16" height="12" rx="2" fill="#fbbf24"/>
  <text x="75" y="423" font-size="10" fill="#333">IMU_Feedback_Task: 互补滤波 → xFeedbackQueue → Control_Task</text>

  <rect x="50" y="432" width="16" height="12" rx="2" fill="#60a5fa"/>
  <text x="75" y="443" font-size="10" fill="#333">Control_Task: PID修正 → xControlQueue → Servo_Task</text>

  <rect x="50" y="452" width="16" height="12" rx="2" fill="#34d399"/>
  <text x="75" y="463" font-size="10" fill="#333">Servo_Task: I2C/PCA9685 执行</text>

  <rect x="50" y="472" width="16" height="12" rx="2" fill="#a78bfa"/>
  <text x="75" y="483" font-size="10" fill="#333">WebStatus_Task: 状态聚合 → WebSocket推送</text>
</svg>
