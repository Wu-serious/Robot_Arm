<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 820" font-family="'Microsoft YaHei','SimHei','PingFang SC',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#333"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/></marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/></marker>
  </defs>

  <!-- Start -->
  <rect x="330" y="45" width="140" height="36" rx="18" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="400" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#3730a3">开始 (每20ms)</text>

  <line x1="400" y1="81" x2="400" y2="105" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== Module 1: 俯仰角PID ===== -->
  <text x="400" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#2563eb">① 俯仰角PID</text>

  <!-- 误差计算 -->
  <rect x="230" y="135" width="340" height="40" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="153" text-anchor="middle" font-size="11" fill="#1e40af">error = phone_target_pitch − mpu6050_measured_pitch</text>

  <line x1="400" y1="175" x2="400" y2="195" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 积分 -->
  <rect x="230" y="195" width="340" height="45" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="213" text-anchor="middle" font-size="11" fill="#1e40af">积分累加: integral += error × dt</text>
  <text x="400" y="231" text-anchor="middle" font-size="10" fill="#666">限幅 ±30 (防止饱和)</text>

  <line x1="400" y1="240" x2="400" y2="260" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 微分 -->
  <rect x="230" y="260" width="340" height="40" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="278" text-anchor="middle" font-size="11" fill="#1e40af">微分: de = (error − prev_error) / dt</text>

  <line x1="400" y1="300" x2="400" y2="320" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- PID输出 -->
  <rect x="230" y="320" width="340" height="45" rx="4" fill="#d1fae5" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="338" text-anchor="middle" font-size="12" font-weight="bold" fill="#065f46">pid_out = Kp·error + Ki·integral + Kd·de</text>
  <text x="400" y="356" text-anchor="middle" font-size="10" fill="#666">Kp=1.0, Ki=0.02, Kd=0.05, 输出限幅 ±15</text>

  <line x1="400" y1="365" x2="400" y2="385" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Jacobian分配 -->
  <rect x="230" y="385" width="340" height="45" rx="4" fill="#d1fae5" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="403" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">修正量通过 Jacobian 伪逆分配到 J1/J2/J3</text>
  <text x="400" y="421" text-anchor="middle" font-size="10" fill="#666">按各关节对末端俯仰角的偏导比例分配</text>

  <line x1="400" y1="430" x2="400" y2="455" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== Module 2: 横滚角映射 ===== -->
  <text x="400" y="470" text-anchor="middle" font-size="12" font-weight="bold" fill="#2563eb">② 横滚角映射</text>

  <rect x="230" y="480" width="340" height="40" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="498" text-anchor="middle" font-size="11" fill="#1e40af">J0_angle = 90 + phone_roll</text>
  <text x="400" y="516" text-anchor="middle" font-size="10" fill="#666">无需PID修正 (底座旋转不影响末端MPU6050姿态)</text>

  <!-- 汇合点：PID修正量和横滚角映射汇合 -->
  <line x1="400" y1="520" x2="400" y2="545" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== Module 3: EMA滤波 ===== -->
  <text x="400" y="560" text-anchor="middle" font-size="12" font-weight="bold" fill="#d97706">③ EMA滤波</text>

  <rect x="280" y="570" width="240" height="40" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="400" y="588" text-anchor="middle" font-size="11" fill="#92400e">θ = α·θ_new + (1−α)·θ_old</text>
  <text x="400" y="605" text-anchor="middle" font-size="10" fill="#666">α=0.8, 平滑指令过渡</text>

  <line x1="400" y1="610" x2="400" y2="630" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== Module 4: 死区检查 ===== -->
  <text x="400" y="645" text-anchor="middle" font-size="12" font-weight="bold" fill="#d97706">④ 死区检查</text>

  <rect x="280" y="655" width="240" height="40" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="400" y="673" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Δθ &lt; 1° 或 dt &lt; 60ms?</text>

  <line x1="400" y1="695" x2="400" y2="715" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="410" y="710" font-size="10" fill="#22c55e" font-weight="bold">否 → 发送指令</text>

  <!-- "是 → 丢弃" 分支 -->
  <line x1="520" y1="675" x2="580" y2="675" stroke="#ef4444" stroke-width="2"/>
  <text x="590" y="670" font-size="10" fill="#ef4444" font-weight="bold">是 → 丢弃</text>
  <line x1="580" y1="675" x2="580" y2="770" stroke="#ef4444" stroke-width="2"/>
  <line x1="580" y1="770" x2="470" y2="770" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>

  <!-- Update prev_error -->
  <rect x="310" y="715" width="180" height="36" rx="4" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="400" y="738" text-anchor="middle" font-size="11" fill="#5b21b6">保存 error → prev_error</text>

  <line x1="400" y1="751" x2="400" y2="775" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- End -->
  <rect x="330" y="775" width="140" height="36" rx="18" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="400" y="798" text-anchor="middle" font-size="12" font-weight="bold" fill="#3730a3">返回 / 下一周期</text>
</svg>
