<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" font-family="'Microsoft YaHei','SimHei','PingFang SC',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#333"/></marker>
  </defs>

  <!-- Layer 1: Application Layer -->
  <rect x="30" y="50" width="740" height="80" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <rect x="30" y="50" width="140" height="80" rx="10" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
  <text x="100" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">应用层</text>
  <text x="100" y="108" text-anchor="middle" font-size="10" fill="#fef3c7">Application</text>

  <rect x="190" y="62" width="160" height="26" rx="4" fill="#fff" stroke="#d97706" stroke-width="1.5"/>
  <text x="270" y="80" text-anchor="middle" font-size="11" fill="#333">main.c 主程序</text>

  <rect x="370" y="62" width="160" height="26" rx="4" fill="#fff" stroke="#d97706" stroke-width="1.5"/>
  <text x="450" y="80" text-anchor="middle" font-size="11" fill="#333">FreeRTOS 任务管理</text>

  <rect x="550" y="62" width="160" height="54" rx="4" fill="#fff" stroke="#d97706" stroke-width="1.5"/>
  <text x="630" y="82" text-anchor="middle" font-size="10" fill="#333">四任务调度</text>
  <text x="630" y="98" text-anchor="middle" font-size="9" fill="#666">IMU反馈100Hz</text>
  <text x="630" y="112" text-anchor="middle" font-size="9" fill="#666">控制/舵机50Hz</text>

  <!-- Layer 2: Communication Layer -->
  <rect x="30" y="190" width="740" height="90" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <rect x="30" y="190" width="140" height="90" rx="10" fill="#3b82f6" stroke="#2563eb" stroke-width="2"/>
  <text x="100" y="228" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">通信层</text>
  <text x="100" y="250" text-anchor="middle" font-size="10" fill="#dbeafe">Communication</text>

  <rect x="190" y="202" width="150" height="30" rx="4" fill="#fff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="265" y="222" text-anchor="middle" font-size="11" fill="#333">WiFi AP (Arm_AP)</text>

  <rect x="360" y="202" width="150" height="30" rx="4" fill="#fff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="435" y="222" text-anchor="middle" font-size="11" fill="#333">WebServer</text>

  <rect x="530" y="202" width="110" height="30" rx="4" fill="#fff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="585" y="222" text-anchor="middle" font-size="11" fill="#333">WebSocket</text>

  <rect x="660" y="202" width="100" height="30" rx="4" fill="#fff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="710" y="222" text-anchor="middle" font-size="11" fill="#333">DNS Server</text>

  <rect x="360" y="245" width="110" height="25" rx="4" fill="#fff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="415" y="262" text-anchor="middle" font-size="10" fill="#666">HTTP/WS 命令分发</text>

  <rect x="530" y="245" width="230" height="25" rx="4" fill="#fff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="645" y="262" text-anchor="middle" font-size="10" fill="#666">心跳3s / 超时10s / HTTP回退</text>

  <!-- Layer 3: Middleware Layer -->
  <rect x="30" y="320" width="740" height="90" rx="10" fill="#d1fae5" stroke="#16a34a" stroke-width="2"/>
  <rect x="30" y="320" width="140" height="90" rx="10" fill="#22c55e" stroke="#16a34a" stroke-width="2"/>
  <text x="100" y="358" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">中间件层</text>
  <text x="100" y="380" text-anchor="middle" font-size="10" fill="#d1fae5">Middleware</text>

  <rect x="190" y="332" width="160" height="30" rx="4" fill="#fff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="270" y="352" text-anchor="middle" font-size="11" fill="#333">Kinematics 运动学</text>

  <rect x="370" y="332" width="160" height="30" rx="4" fill="#fff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="450" y="352" text-anchor="middle" font-size="11" fill="#333">PID 控制器</text>

  <rect x="550" y="332" width="110" height="30" rx="4" fill="#fff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="605" y="352" text-anchor="middle" font-size="11" fill="#333">Script 脚本</text>

  <rect x="680" y="332" width="90" height="30" rx="4" fill="#fff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="725" y="352" text-anchor="middle" font-size="11" fill="#333">Δ-limiter</text>

  <rect x="190" y="375" width="160" height="25" rx="4" fill="#fff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="270" y="392" text-anchor="middle" font-size="10" fill="#666">FK / IK(几何+迭代)</text>

  <rect x="370" y="375" width="160" height="25" rx="4" fill="#fff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="450" y="392" text-anchor="middle" font-size="10" fill="#666">Kp=1.0 Ki=0.02 Kd=0.05</text>

  <rect x="550" y="375" width="220" height="25" rx="4" fill="#fff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="660" y="392" text-anchor="middle" font-size="10" fill="#666">Reset / Wave / MoveObject</text>

  <!-- Layer 4: Hardware Driver Layer -->
  <rect x="30" y="450" width="740" height="90" rx="10" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2"/>
  <rect x="30" y="450" width="140" height="90" rx="10" fill="#6366f1" stroke="#4f46e5" stroke-width="2"/>
  <text x="100" y="488" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">硬件驱动层</text>
  <text x="100" y="510" text-anchor="middle" font-size="10" fill="#e0e7ff">Hardware Driver</text>

  <rect x="190" y="462" width="120" height="28" rx="4" fill="#fff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="250" y="481" text-anchor="middle" font-size="11" fill="#333">I2C 驱动</text>

  <rect x="330" y="462" width="120" height="28" rx="4" fill="#fff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="390" y="481" text-anchor="middle" font-size="11" fill="#333">PCA9685</text>

  <rect x="470" y="462" width="120" height="28" rx="4" fill="#fff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="530" y="481" text-anchor="middle" font-size="11" fill="#333">MPU6050</text>

  <rect x="610" y="462" width="120" height="28" rx="4" fill="#fff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="670" y="481" text-anchor="middle" font-size="11" fill="#333">Servo 抽象</text>

  <rect x="190" y="502" width="120" height="25" rx="4" fill="#fff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="250" y="519" text-anchor="middle" font-size="10" fill="#666">GPIO51/52</text>

  <rect x="330" y="502" width="120" height="25" rx="4" fill="#fff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="390" y="519" text-anchor="middle" font-size="10" fill="#666">5路PWM 50Hz</text>

  <rect x="470" y="502" width="120" height="25" rx="4" fill="#fff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="530" y="519" text-anchor="middle" font-size="10" fill="#666">互补滤波</text>

  <rect x="610" y="502" width="120" height="25" rx="4" fill="#fff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="670" y="519" text-anchor="middle" font-size="10" fill="#666">SetAngle()</text>

  <!-- IPC arrows between layers -->
  <line x1="400" y1="130" x2="400" y2="190" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="280" x2="400" y2="320" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="410" x2="400" y2="450" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- IPC mechanism label -->
  <rect x="310" y="148" width="180" height="15" rx="3" fill="#fff" stroke="#999" stroke-width="1"/>
  <text x="400" y="159" text-anchor="middle" font-size="8" fill="#666">信号量/队列 IPC</text>
  <rect x="310" y="285" width="180" height="15" rx="3" fill="#fff" stroke="#999" stroke-width="1"/>
  <text x="400" y="296" text-anchor="middle" font-size="8" fill="#666">信号量/队列 IPC</text>
  <rect x="310" y="415" width="180" height="15" rx="3" fill="#fff" stroke="#999" stroke-width="1"/>
  <text x="400" y="426" text-anchor="middle" font-size="8" fill="#666">信号量/队列 IPC</text>
</svg>
