<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="'Microsoft YaHei','SimHei','PingFang SC',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#333"/></marker>
  </defs>

  <!-- ESP32-P4 (Host) -->
  <rect x="50" y="60" width="280" height="325" rx="12" fill="#e0e7ff" stroke="#4f46e5" stroke-width="3"/>
  <text x="190" y="95" text-anchor="middle" font-size="16" font-weight="bold" fill="#3730a3">ESP32-P4 (Host 主控)</text>

  <!-- P4 internal blocks -->
  <rect x="80" y="110" width="220" height="40" rx="6" fill="#fff" stroke="#818cf8" stroke-width="1.5"/>
  <text x="190" y="135" text-anchor="middle" font-size="11" fill="#4338ca">FreeRTOS 多任务调度</text>

  <rect x="80" y="160" width="220" height="40" rx="6" fill="#fff" stroke="#818cf8" stroke-width="1.5"/>
  <text x="190" y="185" text-anchor="middle" font-size="11" fill="#4338ca">WebServer + DNS Server</text>

  <rect x="80" y="210" width="220" height="40" rx="6" fill="#fff" stroke="#818cf8" stroke-width="1.5"/>
  <text x="190" y="235" text-anchor="middle" font-size="11" fill="#4338ca">运动学/PID/控制逻辑</text>

  <rect x="80" y="260" width="220" height="40" rx="6" fill="#fff" stroke="#818cf8" stroke-width="1.5"/>
  <text x="190" y="285" text-anchor="middle" font-size="11" fill="#4338ca">SDIO 主机控制器</text>

  <!-- P4 SDIO pins -->
  <text x="190" y="325" text-anchor="middle" font-size="10" fill="#6366f1" font-weight="bold">P4 SDIO 引脚:</text>
  <text x="100" y="345" font-size="9" fill="#6366f1">GPIO18 CLK  GPIO19 CMD</text>
  <text x="100" y="360" font-size="9" fill="#6366f1">GPIO14 D0   GPIO15 D1</text>
  <text x="100" y="375" font-size="9" fill="#6366f1">GPIO16 D2   GPIO17 D3</text>

  <!-- ESP32-C5 (Co-processor) -->
  <rect x="470" y="60" width="280" height="325" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
  <text x="610" y="95" text-anchor="middle" font-size="16" font-weight="bold" fill="#92400e">ESP32-C5 (Co-processor)</text>

  <!-- C5 internal blocks -->
  <rect x="500" y="110" width="220" height="40" rx="6" fill="#fff" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="610" y="135" text-anchor="middle" font-size="11" fill="#b45309">ESP-Hosted-MCU 固件</text>

  <rect x="500" y="160" width="220" height="40" rx="6" fill="#fff" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="610" y="185" text-anchor="middle" font-size="11" fill="#b45309">Wi-Fi 协议栈 (AP模式)</text>

  <rect x="500" y="210" width="220" height="40" rx="6" fill="#fff" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="610" y="235" text-anchor="middle" font-size="11" fill="#b45309">SDIO 从机控制器</text>

  <rect x="500" y="260" width="220" height="40" rx="6" fill="#fff" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="610" y="285" text-anchor="middle" font-size="11" fill="#b45309">Wi-Fi AP: Arm_AP</text>

  <!-- C5 pins -->
  <text x="610" y="325" text-anchor="middle" font-size="10" fill="#d97706" font-weight="bold">C5 引脚 (ESP-IDF 硬编码):</text>
  <text x="510" y="345" font-size="9" fill="#d97706">GPIO9  CLK   GPIO10 CMD</text>
  <text x="510" y="360" font-size="9" fill="#d97706">GPIO8  D0    GPIO7  D1</text>
  <text x="510" y="375" font-size="9" fill="#d97706">GPIO14 D2    GPIO13 D3</text>

  <!-- SDIO signal lines -->
  <line x1="330" y1="130" x2="470" y2="130" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="400" y="122" text-anchor="middle" font-size="9" fill="#ef4444" font-weight="bold">CLK</text>

  <line x1="330" y1="180" x2="470" y2="180" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="400" y="172" text-anchor="middle" font-size="9" fill="#3b82f6" font-weight="bold">CMD</text>

  <line x1="330" y1="230" x2="470" y2="230" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="400" y="222" text-anchor="middle" font-size="9" fill="#22c55e" font-weight="bold">D0</text>

  <line x1="330" y1="265" x2="470" y2="265" stroke="#a855f7" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="400" y="257" text-anchor="middle" font-size="9" fill="#a855f7" font-weight="bold">D1</text>

  <line x1="330" y1="295" x2="470" y2="295" stroke="#f97316" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="400" y="287" text-anchor="middle" font-size="9" fill="#f97316" font-weight="bold">D2</text>

  <line x1="330" y1="325" x2="470" y2="325" stroke="#14b8a6" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="400" y="317" text-anchor="middle" font-size="9" fill="#14b8a6" font-weight="bold">D3</text>

  <!-- Reset line -->
  <line x1="330" y1="355" x2="470" y2="355" stroke="#6b7280" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="400" y="350" text-anchor="middle" font-size="9" fill="#6b7280">RST (GPIO13→RST/EN)</text>

  <!-- Bus label -->
  <rect x="340" y="145" width="120" height="18" rx="4" fill="#1e293b"/>
  <text x="400" y="158" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">SDIO 6线</text>
</svg>
